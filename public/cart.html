<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaLMur — Корзина</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #EBE3D8; color: #2D2D2D; min-height: 100vh; }
        .cart-header { background: #8B6B4A; color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .cart-header a { color: white; text-decoration: none; font-size: 15px; }
        .cart-header .logo { font-size: 26px; font-weight: bold; letter-spacing: 2px; }
        .container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
        .cart-title { font-size: 28px; margin-bottom: 25px; font-weight: 700; color: #3C2A1E; }
        .cart-item { background: #fff; border-radius: 14px; padding: 24px; margin-bottom: 20px; display: flex; gap: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); align-items: flex-start; }
        .cart-item-img { width: 160px; height: 200px; object-fit: cover; border-radius: 10px; background: #f0e6dd; flex-shrink: 0; }
        .cart-item-info { flex: 1; }
        .cart-item-info h3 { font-size: 18px; margin-bottom: 6px; color: #3C2A1E; }
        .cart-item-info .meta { font-size: 13px; color: #999; margin: 3px 0; }
        .cart-item-info .price { font-size: 22px; font-weight: 700; color: #8B6B4A; margin: 8px 0; }
        .cart-item-actions { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; min-width: 120px; }
        .btn-delete { background: none; border: none; font-size: 22px; cursor: pointer; color: #ccc; }
        .btn-delete:hover { color: #C62828; }
        .btn-pay { padding: 12px 24px; background: #8B6B4A; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn-pay:hover { background: #6B4F37; }
        .form-label { font-size: 12px; font-weight: 700; color: #8B6B4A; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input, .form-select { width: 100%; padding: 10px; border: 2px solid #DDD0C0; border-radius: 8px; font-size: 14px; margin-bottom: 8px; outline: none; }
        .form-row { display: flex; gap: 10px; }
        .form-row > div { flex: 1; }
        .cart-pickup-info { display: none; background: #F4EDE4; padding: 12px; border-radius: 8px; margin-top: 8px; font-size: 13px; }
        .empty-state { text-align: center; padding: 80px; color: #999; font-size: 18px; }
        .empty-state a { color: #8B6B4A; font-weight: 600; text-decoration: none; }
        .toast-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 9998; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .toast-backdrop--show { opacity: 1; pointer-events: all; }
        .toast-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
        .toast-overlay--show { opacity: 1; pointer-events: all; }
        .toast { background: #fff; border-radius: 20px; padding: 32px; text-align: center; max-width: 440px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        .toast__icon-wrap { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; }
        .toast--success .toast__icon-wrap { background: #E8F5E9; color: #4CAF50; }
        .toast--error .toast__icon-wrap { background: #FFEBEE; color: #f44336; }
        .toast__divider { width: 48px; height: 3px; border-radius: 2px; margin: 0 auto 16px; }
        .toast--success .toast__divider { background: #8B6B4A; }
        .toast--error .toast__divider { background: #E57373; }
        .toast__message { font-size: 15px; margin-bottom: 20px; color: #3C2A1E; }
        .toast__close { background: #F4EDE4; border: none; padding: 10px 32px; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; color: #5C3D2E; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: #fff; border-radius: 14px; width: 90%; max-width: 480px; overflow: hidden; }
        .modal__header { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; background: #8B6B4A; color: #fff; }
        .modal__title { font-size: 18px; font-weight: 600; }
        .modal__close { background: none; border: none; font-size: 26px; cursor: pointer; color: rgba(255,255,255,0.8); }
        .modal__body { padding: 24px; text-align: center; }
        .btn-confirm { width: 100%; padding: 14px; background: #8B6B4A; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 12px; }
        @media (max-width: 600px) { .cart-item { flex-direction: column; } .cart-item-img { width: 100%; height: 250px; } .cart-item-actions { flex-direction: row; width: 100%; } }
    </style>
</head>
<body>
    <div class="cart-header">
        <span class="logo">GalaLMur — Корзина</span>
        <div>
            <a href="/" class="btn-back">← В каталог</a>
            <a href="purchases.html" style="margin-left:25px;">Мои покупки</a>
            <a href="cabinet.html" style="margin-left:25px;">Кабинет</a>
            <a href="#" onclick="logout()" style="margin-left:25px;">Выйти</a>
        </div>
    </div>

    <div class="container">
        <h2 class="cart-title">Корзина</h2>
        <div id="cartContainer"><div class="empty-state">Загрузка...</div></div>
    </div>

    <!-- Модалка QR -->
    <div class="modal-overlay" id="qrModal">
        <div class="modal">
            <div class="modal__header"><h3 class="modal__title">Оплата заказа</h3><button class="modal__close" onclick="closeQRModal()">&times;</button></div>
            <div class="modal__body">
                <p id="qrInfo" style="font-weight:600;margin-bottom:8px;"></p>
                <p style="font-size:13px;color:#666;" id="qrDetails"></p>
                <div style="background:#f9f7f4;border-radius:12px;padding:20px;margin:15px 0;">
                    <p style="font-weight:700;color:#8B6B4A;">Сумма:</p>
                    <p style="font-size:28px;font-weight:700;" id="qrTotal"></p>
                    <p style="font-size:12px;color:#999;">Комиссия платформы: 15%</p>
                </div>
                <canvas id="qrCanvas" width="200" height="200" style="margin:10px auto;"></canvas>
                <p style="font-size:13px;color:#999;">Отсканируйте QR-код для оплаты</p>
                <button class="btn-confirm" id="qrPayBtn">Подтвердить оплату</button>
            </div>
        </div>
    </div>

    <div class="toast-backdrop" id="toastBackdrop"></div>
    <div class="toast-overlay" id="toastOverlay">
        <div class="toast" id="toast"><div class="toast__icon-wrap" id="toastIcon"></div><div class="toast__divider"></div><div class="toast__message" id="toastMessage"></div><button class="toast__close" id="toastClose">Понятно</button></div>
    </div>

    <script>
        const to = document.getElementById('toastOverlay'), tb = document.getElementById('toastBackdrop'), tt = document.getElementById('toast'), ti = document.getElementById('toastIcon'), tm = document.getElementById('toastMessage'), tc = document.getElementById('toastClose');
        let ttimer = null;
        let qrCallback = null;

        function showToast(m, e) {
            if (ttimer) clearTimeout(ttimer);
            tt.classList.remove('toast--success', 'toast--error');
            tt.classList.add(e ? 'toast--error' : 'toast--success');
            ti.textContent = e ? '✗' : '✓'; tm.textContent = m;
            to.classList.add('toast-overlay--show'); tb.classList.add('toast-backdrop--show');
            ttimer = setTimeout(() => { to.classList.remove('toast-overlay--show'); tb.classList.remove('toast-backdrop--show'); }, 4000);
        }
        tc.addEventListener('click', () => { to.classList.remove('toast-overlay--show'); tb.classList.remove('toast-backdrop--show'); });
        tb.addEventListener('click', () => { to.classList.remove('toast-overlay--show'); tb.classList.remove('toast-backdrop--show'); });

        async function checkAuth() { if (!(await (await fetch('/api/me')).json()).loggedIn) window.location.href = '/'; }

        async function loadCart() {
            const res = await fetch('/api/cart'); const data = await res.json();
            const c = document.getElementById('cartContainer');
            if (!data.cart || !data.cart.length) { c.innerHTML = '<div class="empty-state">Корзина пуста<br><a href="/">Перейти в каталог</a></div>'; return; }
            c.innerHTML = data.cart.map(item => {
                const img = (item.dress_image || '').split(',')[0] || '';
                const sizesArr = (item.dress_sizes || '').split(',').map(s => s.trim()).filter(s => s);
                return `<div class="cart-item">
                    <img src="${img}" class="cart-item-img" onerror="this.style.display='none';">
                    <div class="cart-item-info">
                        <h3>${item.dress_name}</h3>
                        <p class="meta">Размеры: ${item.dress_sizes || 'не указаны'}</p>
                        <p class="price">${item.dress_price.toLocaleString('ru-RU')} ₽ / день</p>
                        <div class="form-row">
                            <div><label class="form-label">Дата начала</label><input type="date" class="cart-date-start form-input" min="${new Date().toISOString().split('T')[0]}"></div>
                            <div><label class="form-label">Дата окончания</label><input type="date" class="cart-date-end form-input" min="${new Date().toISOString().split('T')[0]}"></div>
                        </div>
                        <div class="form-row">
                            <div><label class="form-label">Размер</label><select class="cart-size form-select">${sizesArr.map(s => `<option value="${s}">${s}</option>`).join('')}</select></div>
                            <div><label class="form-label">Способ</label><select class="cart-delivery form-select"><option value="delivery">Доставка</option><option value="pickup">Самовывоз</option></select></div>
                        </div>
                        <input type="text" class="cart-address form-input" placeholder="Адрес доставки">
                        <input type="text" class="cart-time form-input" placeholder="Удобное время">
                        <div class="cart-pickup-info">
                            <strong>Адрес самовывоза:</strong><br>
                            г. Стерлитамак, ул. Худайбердина, д. 118<br>
                            Ежедневно с 10:00 до 21:00
                        </div>
                    </div>
                    <div class="cart-item-actions">
                        <button class="btn-delete" onclick="deleteItem(${item.id})">✕</button>
                        <button class="btn-pay" onclick="payItem(${item.id}, '${item.dress_name.replace(/'/g, "\\'")}', ${item.dress_price}, '${item.dress_sizes || ''}')">Оплатить</button>
                    </div>
                </div>`;
            }).join('');
        }

        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('cart-delivery')) {
                const item = e.target.closest('.cart-item');
                const address = item.querySelector('.cart-address');
                const time = item.querySelector('.cart-time');
                const pickup = item.querySelector('.cart-pickup-info');
                if (e.target.value === 'pickup') {
                    address.style.display = 'none'; time.style.display = 'none';
                    if (pickup) pickup.style.display = 'block';
                } else {
                    address.style.display = 'block'; time.style.display = 'block';
                    if (pickup) pickup.style.display = 'none';
                }
            }
        });

        async function deleteItem(id) { await fetch('/api/cart/' + id, { method: 'DELETE' }); loadCart(); }

        function showQRModal(name, size, dateStart, dateEnd, days, total, delivery, address, time, callback) {
            qrCallback = callback;
            document.getElementById('qrInfo').textContent = name;
            document.getElementById('qrDetails').textContent = `Размер: ${size} | ${dateStart} - ${dateEnd} | ${days} дн. | ${delivery === 'pickup' ? 'Самовывоз' : 'Доставка'}`;
            document.getElementById('qrTotal').textContent = total.toLocaleString('ru-RU') + ' ₽';
            const canvas = document.getElementById('qrCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 200, 200);
            const size_qr = 20; const margin = 20;
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    if ((i < 2 && j < 2) || (i < 2 && j > 5) || (i > 5 && j < 2)) {
                        ctx.fillStyle = '#000';
                        ctx.fillRect(margin + j * size_qr, margin + i * size_qr, size_qr, size_qr);
                    }
                }
            }
            ctx.fillStyle = '#000';
            ctx.fillRect(margin + 2*size_qr, margin + 2*size_qr, 4*size_qr, 4*size_qr);
            ctx.fillStyle = '#fff';
            ctx.fillRect(margin + 3*size_qr, margin + 3*size_qr, 2*size_qr, 2*size_qr);
            document.getElementById('qrModal').style.display = 'flex';
        }

        function closeQRModal() { document.getElementById('qrModal').style.display = 'none'; }
        document.getElementById('qrModal').addEventListener('click', function(e) { if (e.target === this) closeQRModal(); });
        document.getElementById('qrPayBtn').addEventListener('click', function() { if (qrCallback) qrCallback(); });

        async function payItem(id, name, price, sizes) {
            const item = document.querySelector(`.cart-item:has(button[onclick*="${id}"])`);
            if (!item) return;
            const dateStart = item.querySelector('.cart-date-start')?.value;
            const dateEnd = item.querySelector('.cart-date-end')?.value;
            const size = item.querySelector('.cart-size')?.value || (sizes.split(',')[0]?.trim() || 'M');
            const delivery = item.querySelector('.cart-delivery')?.value || 'delivery';
            const address = item.querySelector('.cart-address')?.value || '';
            const time = item.querySelector('.cart-time')?.value || '';

            if (!dateStart || !dateEnd) { showToast('Выберите даты', true); return; }
            const d1 = new Date(dateStart), d2 = new Date(dateEnd);
            if (d2 < d1) { showToast('Дата окончания раньше начала', true); return; }
            const days = Math.ceil((d2 - d1) / (1000*60*60*24)) + 1;
            const total = price * days;
            if (delivery === 'delivery' && !address) { showToast('Введите адрес', true); return; }

            showQRModal(name, size, dateStart, dateEnd, days, total, delivery, address, time, async () => {
                const res = await fetch('/api/bookings', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ dress: name, size, date_start: dateStart, date_end: dateEnd, days, total, address, delivery_time: time, delivery_type: delivery }) });
                const data = await res.json();
                if (data.success) { await fetch('/api/cart/' + id, { method: 'DELETE' }); showToast('Оплачено!', false); closeQRModal(); loadCart(); }
                else showToast(data.message || 'Ошибка', true);
            });
        }

        async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = '/'; }
        checkAuth(); loadCart();
    </script>
</body>
</html>
